<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ARC Prize Leaderboard</title>
    <link rel="canonical" href="./">
    <style>
        body {
            margin: 48px;
            font: 15px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: #111827;
        }

        a {
            color: #2563eb;
        }
    </style>
</head>
<body>
    <p>Redirecting to the <a id="leaderboard-link" href="./">leaderboard</a>.</p>

    <script>
        (function () {
            const next = `./${location.search}${location.hash}`;
            document.getElementById('leaderboard-link').href = next;
            location.replace(next);
        }());
    </script>
</body>
</html>
