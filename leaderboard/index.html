<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARC Prize 2026 Leaderboard Monitor</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background: #1a1a2e;
            color: #eee;
        }
        h1 {
            text-align: center;
            color: #00d9ff;
            margin-bottom: 12px;
            font-size: 1.5rem;
        }
        .comp-switcher {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 16px;
        }
        .comp-switcher a {
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none;
            color: #9fb3c8;
            background: #16213e;
            border: 1px solid #2a3a5e;
        }
        .comp-switcher a:hover {
            color: #fff;
        }
        .comp-switcher a.active {
            color: #0d1b2a;
            background: #00d9ff;
            border-color: #00d9ff;
        }
        .container {
            max-width: 100%;
            margin: 0 auto;
            overflow-x: auto;
        }
        .status {
            text-align: center;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 8px;
            background: #16213e;
            font-size: 0.85rem;
        }
        .status.loading {
            color: #fbbf24;
        }
        .status.success {
            color: #10b981;
        }
        .status.error {
            color: #ef4444;
        }
        .grid-container {
            background: #16213e;
            border-radius: 8px;
            padding: 10px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .grid-container h2 {
            color: #00d9ff;
            margin-top: 0;
        }
        .header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        .table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin: 0 -10px;
            padding: 0 10px;
        }
:root {
            --pos-width: 44px;
            --team-width: 180px;
            --score-width: 60px;
            --date-col-width: 60px;
            --header-height: 34px;
            --row-height: 48px;
        }
        table {
            table-layout: fixed;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 13px;
        }
        col.pos-col {
            width: var(--pos-width);
        }
        col.team-col {
            width: var(--team-width);
        }
        col.score-col {
            width: var(--score-width);
        }
        col.subs-col,
        col.date-col {
            width: var(--date-col-width);
        }
        th, td {
            padding: 8px 12px;
            text-align: center;
            border: 1px solid #333;
            white-space: nowrap;
            box-sizing: border-box;
            height: var(--row-height);
            line-height: 1.2;
            overflow: hidden;
        }
        th {
            background: #0d1b2a;
            color: #00d9ff;
            font-weight: 600;
            height: var(--header-height);
        }
        th.team-header {
            text-align: left;
            width: var(--team-width);
            min-width: var(--team-width);
            max-width: var(--team-width);
            position: sticky;
            left: var(--pos-width);
            background: #0d1b2a;
            transform: translateZ(1px);
        }
        th.pos-header {
            width: var(--pos-width);
            min-width: var(--pos-width);
            max-width: var(--pos-width);
            position: sticky;
            left: 0;
            background: #0d1b2a;
            transform: translateZ(2px);
        }
        td.pos-cell {
            font-weight: 500;
            color: #888;
            width: var(--pos-width);
            min-width: var(--pos-width);
            max-width: var(--pos-width);
            position: sticky;
            left: 0;
            background: #16213e;
            padding-left: 4px;
            padding-right: 4px;
            font-size: 11px;
            font-variant-numeric: tabular-nums;
        }
        th.pos-header {
            padding-left: 4px;
            padding-right: 4px;
        }
        td.team-cell {
            text-align: left;
            font-weight: 500;
            color: #00d9ff;
            width: var(--team-width);
            min-width: var(--team-width);
            max-width: var(--team-width);
            overflow: hidden;
            text-overflow: ellipsis;
            position: sticky;
            left: var(--pos-width);
            background: #16213e;
        }
        th.score-header {
            width: var(--score-width);
            min-width: var(--score-width);
            max-width: var(--score-width);
            position: sticky;
            left: calc(var(--pos-width) + var(--team-width));
            background: #0d1b2a;
            transform: translateZ(1px);
            padding-left: 3px;
            padding-right: 3px;
        }
        td.total-score-cell {
            width: var(--score-width);
            min-width: var(--score-width);
            max-width: var(--score-width);
            position: sticky;
            left: calc(var(--pos-width) + var(--team-width));
            background: #16213e;
            padding-left: 3px;
            padding-right: 3px;
            vertical-align: middle;
        }
        th.subs-header {
            width: var(--date-col-width);
            min-width: var(--date-col-width);
            max-width: var(--date-col-width);
            padding-left: 3px;
            padding-right: 3px;
        }
        tbody tr {
            content-visibility: auto;
            contain-intrinsic-size: auto var(--row-height);
            height: var(--row-height);
        }
        td.score-cell {
            background: #1a2744;
            width: var(--date-col-width);
            min-width: var(--date-col-width);
            max-width: var(--date-col-width);
            padding: 4px 3px;
            vertical-align: middle;
        }
        td.score-cell.has-data {
            background: #0d2818;
        }
        .score-value {
            font-weight: bold;
            color: #10b981;
            display: block;
            line-height: 1.15;
        }
        .time-value {
            font-size: 11px;
            color: #888;
            display: block;
            line-height: 1.2;
            margin-top: 3px;
        }
        .no-data {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .date-header {
            font-size: 11px;
            width: var(--date-col-width);
            min-width: var(--date-col-width);
            max-width: var(--date-col-width);
        }
        /* Mobile styles */
        @media (max-width: 600px) {
            :root {
                --pos-width: 44px;
                --team-width: 90px;
                --score-width: 52px;
                --date-col-width: 52px;
            }
            body {
                padding: 10px;
            }
            h1 {
                font-size: 1.2rem;
                margin-bottom: 10px;
            }
            .status {
                padding: 8px;
                margin-bottom: 10px;
                font-size: 0.75rem;
            }
            .grid-container {
                padding: 5px;
                border-radius: 4px;
            }
            table {
                font-size: 11px;
            }
            th, td {
                padding: 6px 8px;
            }
            th.pos-header {
                width: var(--pos-width);
                min-width: var(--pos-width);
                max-width: var(--pos-width);
            }
            th.team-header {
                width: var(--team-width);
                min-width: var(--team-width);
                max-width: var(--team-width);
                left: var(--pos-width);
            }
            td.pos-cell {
                width: var(--pos-width);
                min-width: var(--pos-width);
                max-width: var(--pos-width);
            }
            td.team-cell {
                left: var(--pos-width);
                width: var(--team-width);
                min-width: var(--team-width);
                max-width: var(--team-width);
                overflow: hidden;
                text-overflow: ellipsis;
            }
            th.score-header {
                width: var(--score-width);
                min-width: var(--score-width);
                max-width: var(--score-width);
                left: calc(var(--pos-width) + var(--team-width));
            }
            td.total-score-cell {
                width: var(--score-width);
                min-width: var(--score-width);
                max-width: var(--score-width);
                left: calc(var(--pos-width) + var(--team-width));
            }
            .time-value {
                font-size: 9px;
            }
            .date-header {
                font-size: 9px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="page-title">Leaderboard History</h1>
        <div id="comp-switcher" class="comp-switcher"></div>

        <div id="status" class="status loading">Loading data...</div>

        <div class="grid-container">
            <div id="grid-table">
                <div class="no-data">Loading...</div>
            </div>
        </div>
    </div>

    <script>
        // The two ARC Prize 2026 tracks. Both share ONE get_history endpoint (served by
        // leaderboard.py, whose single cron polls both); the track is chosen by the
        // endpoint's own ?comp= query param. Set an endpoint to '' to fall back to a
        // static `jsonl` snapshot in this folder. Pick a track in THIS page with
        // ?comp=arc2 / ?comp=arc3 (default arc3, matching the original URL).
        const ENDPOINT = 'https://tonghuikang--arc3-leaderboard-monitor-get-history.modal.run';
        const COMPETITIONS = {
            arc3: {
                label: 'ARC-AGI-3',
                endpoint: ENDPOINT,  // default track, no param needed
                jsonl: 'leaderboard.jsonl',
                runtimeCutoffMinutes: 600,
            },
            arc2: {
                label: 'ARC-AGI-2',
                endpoint: `${ENDPOINT}?comp=arc2`,
                jsonl: 'leaderboard2.jsonl',
                runtimeCutoffMinutes: 750,
            },
        };
        const COMP = COMPETITIONS[new URLSearchParams(location.search).get('comp')] ? new URLSearchParams(location.search).get('comp') : 'arc3';
        const CONF = COMPETITIONS[COMP];

        const ENDPOINT_URL = CONF.endpoint;
        const DATA_URL = ENDPOINT_URL || CONF.jsonl;
        const REFRESH_MS = 60000;  // matches the per-minute cron; only used with a live endpoint
        const DISPLAY_START_DATE = '2026-06-01';

        // Title + track switcher chrome.
        document.title = `${CONF.label} Leaderboard Monitor`;
        document.getElementById('page-title').textContent = `${CONF.label} Leaderboard History`;
        document.getElementById('comp-switcher').innerHTML = Object.entries(COMPETITIONS)
            .map(([key, c]) => `<a href="?comp=${key}" class="${key === COMP ? 'active' : ''}">${c.label}</a>`)
            .join('');

        // Module-scope view state so auto-refresh can re-render without resetting sort.
        let positions = [];
        let history = {};
        let sortedDates = [];
        let sortMode = 'public';   // live Kaggle rank
        let activeObserver = null;

        function formatMinutes(minutes) {
            if (minutes === undefined || minutes === null) return '';
            if (minutes < 0) return '?';
            if (minutes > CONF.runtimeCutoffMinutes) return '-';
            const hours = Math.floor(minutes / 60);
            const mins = minutes % 60;
            return `${hours}h ${mins}m`;
        }

        // Group a (possibly counter-suffixed) date key down to its YYYY-MM-DD day.
        function dayOf(key) {
            return key.substring(0, 10);
        }

        function computeSortedDates(history) {
            const allDates = new Set();
            for (const teamId of Object.keys(history)) {
                for (const date of Object.keys(history[teamId])) {
                    const day = dayOf(date);
                    if (day >= DISPLAY_START_DATE) {
                        allDates.add(day);
                    }
                }
            }
            // ISO YYYY-MM-DD strings sort chronologically; newest day first.
            return Array.from(allDates).sort((a, b) => b.localeCompare(a));
        }

        // Accepts either the live endpoint shape {positions, history} or a static
        // leaderboard.jsonl (one team record per line).
        function parseData(text) {
            const trimmed = text.trim();
            const out = { positions: [], history: {} };
            try {
                const obj = JSON.parse(trimmed);
                if (obj && Array.isArray(obj.positions)) {
                    out.positions = obj.positions.map(p => p.slice());
                    out.history = obj.history || {};
                    return out;
                }
            } catch (_) { /* not a single JSON object; treat as jsonl */ }
            for (const line of trimmed.split('\n')) {
                if (!line) continue;
                const rec = JSON.parse(line);
                out.positions.push([rec.team_id, rec.team_name, rec.position, rec.sub_count, rec.score, rec.final_rank, rec.final_score]);
                out.history[rec.team_id] = rec.history || {};
            }
            return out;
        }

        function tableWidthExpression(dateCount) {
            const fixedColumns = [
                'var(--pos-width)',
                'var(--team-width)',
                'var(--score-width)',
            ];
            const dateLikeColumns = Array(dateCount + 1).fill('var(--date-col-width)');
            return `calc(${fixedColumns.concat(dateLikeColumns).join(' + ')})`;
        }

        function buildSkeleton(sortedDates, sortMode) {
            const tableWidth = tableWidthExpression(sortedDates.length);
            let html = `<table style="width: ${tableWidth}; min-width: ${tableWidth}; max-width: ${tableWidth};"><colgroup>`;
            html += '<col class="pos-col">';
            html += '<col class="team-col">';
            html += '<col class="score-col">';
            html += '<col class="subs-col">';
            for (const _date of sortedDates) {
                html += '<col class="date-col">';
            }
            html += '</colgroup><thead><tr>';
            html += '<th class="pos-header">#</th>';
            html += '<th class="team-header">Team</th>';
            html += '<th class="score-header">Public</th>';
            html += '<th class="subs-header">Subs</th>';
            for (const date of sortedDates) {
                html += `<th class="date-header">${date.substring(5)}</th>`;  // MM-DD
            }
            html += '</tr></thead><tbody id="rows"></tbody></table>';
            return html;
        }

        function sortPositions(positions, mode) {
            if (mode === 'public') {
                positions.sort((a, b) => {
                    const pa = parseInt(a[2]), pb = parseInt(b[2]);
                    const va = Number.isFinite(pa) && pa > 0 ? pa : Infinity;
                    const vb = Number.isFinite(pb) && pb > 0 ? pb : Infinity;
                    return va - vb;
                });
            } else {
                positions.sort((a, b) => {
                    const ra = a[5], rb = b[5];
                    if (ra && rb) return ra - rb;
                    if (ra) return -1;
                    if (rb) return 1;
                    return (parseInt(a[2]) || 0) - (parseInt(b[2]) || 0);
                });
            }
        }

        function buildRowsHTML(positionsSlice, history, sortedDates, startIndex) {
            let html = '';
            for (let i = 0; i < positionsSlice.length; i++) {
                const pos = positionsSlice[i];
                const [teamId, teamName, position, subCount, score] = pos;
                const teamHist = history[teamId] || {};

                html += '<tr>';
                html += `<td class="pos-cell">${position}</td>`;
                html += `<td class="team-cell">${teamName}</td>`;
                html += `<td class="total-score-cell"><span class="score-value">${score}</span></td>`;
                html += `<td class="score-cell">${subCount}</td>`;

                const dateEntries = [];
                for (const date of sortedDates) {
                    let entry = null;
                    for (const key of Object.keys(teamHist)) {
                        if (dayOf(key) === date) {
                            if (!entry || key > entry.key) {
                                entry = { key, data: teamHist[key] };
                            }
                        }
                    }
                    dateEntries.push(entry);
                }

                const allEntries = Object.entries(teamHist)
                    .map(([key, data]) => ({ key, score: data[0], minutes_taken: data[1] }))
                    .sort((a, b) => a.key.localeCompare(b.key));

                const scoreAtKey = {};
                let runningMaxScore = -Infinity;
                for (const entry of allEntries) {
                    const currentScore = parseFloat(entry.score);
                    if (Number.isFinite(currentScore) && currentScore > runningMaxScore) {
                        scoreAtKey[entry.key] = entry.score;  // keep original formatting
                        runningMaxScore = currentScore;
                    } else {
                        scoreAtKey[entry.key] = null;
                    }
                }

                for (let i = 0; i < sortedDates.length; i++) {
                    const entry = dateEntries[i];
                    if (!entry) {
                        html += '<td class="score-cell">-</td>';
                    } else {
                        const timeStr = formatMinutes(entry.data[1]);
                        const newHighScore = scoreAtKey[entry.key];
                        const scoreCell = newHighScore !== null && newHighScore !== undefined ? newHighScore : '-';
                        html += '<td class="score-cell has-data">';
                        html += `<span class="score-value">${scoreCell}</span>`;
                        html += `<span class="time-value">${timeStr}</span>`;
                        html += '</td>';
                    }
                }
                html += '</tr>';
            }
            return html;
        }

        function render() {
            const gridEl = document.getElementById('grid-table');
            if (activeObserver) { activeObserver.disconnect(); activeObserver = null; }
            const scrollY = window.scrollY;
            sortPositions(positions, sortMode);
            gridEl.innerHTML = buildSkeleton(sortedDates, sortMode);
            const tbody = document.getElementById('rows');
            const CHUNK = 500;
            let rendered = 0;
            const appendChunk = () => {
                const slice = positions.slice(rendered, rendered + CHUNK);
                tbody.insertAdjacentHTML('beforeend', buildRowsHTML(slice, history, sortedDates, rendered));
                rendered += slice.length;
            };
            appendChunk();
            if (rendered < positions.length) {
                gridEl.insertAdjacentHTML('beforeend', '<div id="load-sentinel" style="height:1px"></div>');
                const sentinel = document.getElementById('load-sentinel');
                activeObserver = new IntersectionObserver((entries) => {
                    if (!entries.some(e => e.isIntersecting)) return;
                    appendChunk();
                    if (rendered >= positions.length) {
                        activeObserver.disconnect();
                        activeObserver = null;
                        sentinel.remove();
                    }
                }, { rootMargin: '800px' });
                activeObserver.observe(sentinel);
            }
            window.scrollTo(0, scrollY);
        }

        async function loadData() {
            const statusEl = document.getElementById('status');
            const gridEl = document.getElementById('grid-table');

            if (positions.length === 0) {
                statusEl.className = 'status loading';
                statusEl.textContent = 'Loading data...';
            }

            try {
                const response = await fetch(DATA_URL, { cache: 'no-store' });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const text = await response.text();
                const parsed = parseData(text);

                if (parsed.positions.length === 0) {
                    statusEl.className = 'status';
                    statusEl.textContent = 'No data available yet — the listener may not have run its first poll.';
                    gridEl.innerHTML = '<div class="no-data">No data.</div>';
                    return;
                }

                positions = parsed.positions;
                history = parsed.history;
                sortedDates = computeSortedDates(history);

                if (sortedDates.length === 0) {
                    gridEl.innerHTML = '<div class="no-data">No historical data recorded since June 1.</div>';
                    statusEl.className = 'status';
                    statusEl.textContent = 'No historical data since June 1';
                    return;
                }

                render();

                const now = new Date();
                const hh = String(now.getHours()).padStart(2, '0');
                const mm = String(now.getMinutes()).padStart(2, '0');
                const live = !!ENDPOINT_URL;
                statusEl.className = 'status success';
                statusEl.textContent = live
                    ? `Live — ${positions.length} teams. Updated ${hh}:${mm}, auto-refreshing every minute.`
                    : `Static snapshot — ${positions.length} teams. Times may vary by up to 30 minutes.`;
            } catch (e) {
                statusEl.className = 'status error';
                statusEl.textContent = `Error: ${e.message}`;
                console.error('Failed to load data:', e);
            }
        }

        loadData();
        if (ENDPOINT_URL) {
            setInterval(loadData, REFRESH_MS);
        }
    </script>
</body>
</html>
